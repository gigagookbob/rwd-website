<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 440" fill="none">
  <style>
    text { font-family: "SF Mono", "Fira Code", "Cascadia Code", Consolas, monospace; font-size: 13px; }
    .prompt { fill: #a1a1aa; }
    .cmd { fill: #fafafa; }
    .cyan { fill: #06b6d4; }
    .dim { fill: #52525b; }
    .muted { fill: #71717a; }
    .txt { fill: #a1a1aa; }
    .blue { fill: #60a5fa; }
    .magenta { fill: #c084fc; }
    .green { fill: #22c55e; }
    .group { opacity: 0; animation: fadeIn 0.4s ease forwards; }
    @keyframes fadeIn { to { opacity: 1; } }
    .g0 { animation-delay: 0s; }
    .g1 { animation-delay: 0.8s; }
    .g2 { animation-delay: 1.6s; }
    .g3 { animation-delay: 2.8s; }
    .g4 { animation-delay: 3.4s; }
    .g5 { animation-delay: 4.0s; }
  </style>

  <!-- $ rwd today -->
  <g class="group g0">
    <text x="20" y="24"><tspan class="prompt">$ </tspan><tspan class="cmd">rwd today</tspan></text>
  </g>

  <!-- ASCII art banner -->
  <g class="group g1">
    <text x="20" y="60" class="cyan">  ██████  ██     ██ ██████</text>
    <text x="20" y="75" class="cyan">  ██   ██ ██     ██ ██   ██</text>
    <text x="20" y="90" class="cyan">  ██████  ██  █  ██ ██   ██</text>
    <text x="245" y="90" class="dim">rewind your day  v0.11.0</text>
    <text x="20" y="105" class="cyan">  ██   ██ ██ ███ ██ ██   ██</text>
    <text x="20" y="120" class="cyan">  ██   ██  ███ ███  ██████</text>
  </g>

  <!-- Session info box -->
  <g class="group g2">
    <text x="20" y="156" class="muted">  ┌──────────────────────────────────────────┐</text>
    <text x="20" y="174" class="muted">  │</text>
    <text x="52" y="174" class="txt">2026-03-25 09:29</text>
    <text x="370" y="174" class="muted">│</text>
    <text x="20" y="192" class="muted">  ├──────────────────────────────────────────┤</text>
    <text x="20" y="210" class="muted">  │</text>
    <text x="52" y="210" class="blue">Claude Code</text>
    <text x="370" y="210" class="muted">│</text>
    <text x="20" y="228" class="muted">  │</text>
    <text x="52" y="228" class="txt">08:56 ~ 09:29</text>
    <text x="370" y="228" class="muted">│</text>
    <text x="20" y="246" class="muted">  │</text>
    <text x="52" y="246" class="txt">Sessions: 3  in 847,291  out 24,108</text>
    <text x="370" y="246" class="muted">│</text>
    <text x="20" y="264" class="muted">  └──────────────────────────────────────────┘</text>
  </g>

  <!-- Analyzing -->
  <g class="group g3">
    <text x="20" y="300" class="magenta">Analyzing insights via Claude API...</text>
  </g>

  <!-- Done -->
  <g class="group g4">
    <text x="20" y="330"><tspan class="green">✓</tspan><tspan class="txt"> Done in 8.3s (input: 7209 / output: 1842)</tspan></text>
  </g>

  <!-- Saved -->
  <g class="group g5">
    <text x="20" y="370" class="green">Markdown saved: ~/Vault/Daily/2026-03-25.md</text>
  </g>
</svg>
